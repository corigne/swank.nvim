name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Suppress Node.js 20 deprecation warnings from bundled actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow CI to update repository contents (README badge) when running on main
permissions:
  contents: write

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Neovim (stable)
        run: |
          wget -q https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.appimage
          chmod +x nvim-linux-x86_64.appimage
          ./nvim-linux-x86_64.appimage --appimage-extract > /dev/null
          sudo ln -sf "$PWD/squashfs-root/usr/bin/nvim" /usr/local/bin/nvim
          nvim --version | head -1

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/lazy/plenary.nvim

      - name: Run unit tests
        run: make test

  # ── Coverage ───────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v5

      - name: Install Neovim (stable)
        run: |
          wget -q https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.appimage
          chmod +x nvim-linux-x86_64.appimage
          ./nvim-linux-x86_64.appimage --appimage-extract > /dev/null
          sudo ln -sf "$PWD/squashfs-root/usr/bin/nvim" /usr/local/bin/nvim

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/lazy/plenary.nvim

      - name: Install luarocks (Lua 5.1)
        run: sudo apt-get install -y luarocks lua5.1

      - name: Install luacov
        run: |
          luarocks install luacov --local --lua-version 5.1
          luarocks install luacov-reporter-lcov --local --lua-version 5.1

      - name: Run coverage
        run: |
          export PATH="$HOME/.luarocks/bin:$PATH"
          make coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: luacov-report
          path: luacov.report.out
          if-no-files-found: warn

      - name: Update README coverage badge
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If running on a PR, switch to the PR head branch so commits land in the PR
          if [ -n "${GITHUB_HEAD_REF}" ]; then
            git fetch origin "${GITHUB_HEAD_REF}:${GITHUB_HEAD_REF}"
            git checkout "${GITHUB_HEAD_REF}"
          fi
          # Update badge from the generated luacov.report.out
          bash scripts/update_coverage_badge.sh
          git add README.md luacov.report.out
          if git diff --staged --quiet; then
            echo "No badge change"
          else
            git commit -m "ci(badge): update coverage badge"
            # Push commit back to the PR branch
            git push origin HEAD:"${GITHUB_HEAD_REF:-$(git rev-parse --abbrev-ref HEAD)}"
          fi

  # ── Integration tests ──────────────────────────────────────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Neovim (stable)
        run: |
          wget -q https://github.com/neovim/neovim/releases/download/stable/nvim-linux-x86_64.appimage
          chmod +x nvim-linux-x86_64.appimage
          ./nvim-linux-x86_64.appimage --appimage-extract > /dev/null
          sudo ln -sf "$PWD/squashfs-root/usr/bin/nvim" /usr/local/bin/nvim

      - name: Install plenary.nvim
        run: |
          git clone --depth 1 https://github.com/nvim-lua/plenary.nvim \
            ~/.local/share/nvim/lazy/plenary.nvim

      - name: Install SBCL (latest, via roswell/sbcl_bin)
        run: |
          SBCL_VERSION=$(curl -fsSL https://api.github.com/repos/roswell/sbcl_bin/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          echo "Installing SBCL ${SBCL_VERSION}"
          curl -fL -o sbcl.tar.bz2 \
            "https://github.com/roswell/sbcl_bin/releases/download/${SBCL_VERSION}/sbcl-${SBCL_VERSION}-x86-64-linux-binary.tar.bz2"
          tar xjf sbcl.tar.bz2
          cd "sbcl-${SBCL_VERSION}-x86-64-linux" && sudo bash install.sh
          sbcl --version

      - name: Install Quicklisp
        run: |
          curl -fsSL https://beta.quicklisp.org/quicklisp.lisp -o /tmp/quicklisp.lisp
          sbcl --noinform --non-interactive \
            --load /tmp/quicklisp.lisp \
            --eval '(quicklisp-quickstart:install :path (merge-pathnames "quicklisp/" (user-homedir-pathname)))' \
            --eval '(quit)'

      - name: Preload Swank via Quicklisp
        run: |
          sbcl --noinform --non-interactive \
            --load ~/quicklisp/setup.lisp \
            --eval "(handler-bind ((warning (function muffle-warning))) (ql:quickload :swank :silent t))" \
            --eval '(quit)'

      - name: Start Swank server
        run: |
          sbcl --noinform \
            --load ~/quicklisp/setup.lisp \
            --eval "(handler-bind ((warning (function muffle-warning))) (ql:quickload :swank :silent t))" \
            --eval '(declaim (sb-ext:muffle-conditions warning))' \
            --eval '(swank:create-server :port 4005 :dont-close t)' \
            --eval '(loop (sleep 60))' &

          echo "Waiting for Swank on :4005..."
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 4005 && echo "Swank ready after ${i}s" && break
            sleep 1
          done
          nc -z 127.0.0.1 4005 || (echo "Swank failed to start" && exit 1)

      - name: Run integration tests
        env:
          SWANK_PORT: "4005"
        run: make test-integration
